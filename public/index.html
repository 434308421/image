<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GPT Image 2 · 生图</title>
  <meta name="description" content="基于 OpenAI 兼容接口的 gpt-image-2 生图工具" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="mark" aria-hidden="true">GI2</div>
        <div>
          <h1>GPT Image 2</h1>
          <p class="sub">提示词 · 尺寸 · 清晰度 · 参考图 · 历史</p>
        </div>
      </div>
      <div class="top-actions" role="tablist" aria-label="主功能">
        <button type="button" id="tab-create" class="tab is-active" data-tab="create" role="tab" aria-selected="true">生成</button>
        <button type="button" id="tab-history" class="tab" data-tab="history" role="tab" aria-selected="false">历史 <span id="history-count" class="badge">0</span></button>
      </div>
    </header>

    <main>
      <section id="panel-create" class="panel is-active" role="tabpanel">
        <div class="layout">
          <form id="gen-form" class="card form-card" autocomplete="off">
            <label class="field">
              <span class="label">访问密码</span>
              <input id="password" name="password" type="password" placeholder="输入访问密码" required autocomplete="current-password" />
            </label>
            <label class="check-row">
              <input id="remember-password" type="checkbox" />
              <span>记住密码（仅本机当前浏览器，默认关闭）</span>
            </label>

            <label class="field">
              <span class="label">提示词 <span id="prompt-count" class="hint">0 / 4000</span></span>
              <textarea id="prompt" name="prompt" rows="6" maxlength="4000" placeholder="描述你想生成的画面，越具体越好…" required></textarea>
            </label>

            <div class="row-2">
              <div class="field">
                <span class="label" id="aspect-label">尺寸（画幅）</span>
                <div class="seg" role="radiogroup" aria-labelledby="aspect-label">
                  <button type="button" class="seg-btn is-active" data-aspect="3:4" role="radio" aria-checked="true">3:4</button>
                  <button type="button" class="seg-btn" data-aspect="4:3" role="radio" aria-checked="false">4:3</button>
                  <button type="button" class="seg-btn" data-aspect="9:16" role="radio" aria-checked="false">9:16</button>
                  <button type="button" class="seg-btn" data-aspect="16:9" role="radio" aria-checked="false">16:9</button>
                </div>
                <input type="hidden" id="aspect" name="aspect" value="3:4" />
              </div>

              <div class="field">
                <span class="label" id="quality-label">清晰度</span>
                <div class="seg" role="radiogroup" aria-labelledby="quality-label">
                  <button type="button" class="seg-btn is-active" data-quality="1k" role="radio" aria-checked="true">1K</button>
                  <button type="button" class="seg-btn" data-quality="2k" role="radio" aria-checked="false">2K</button>
                  <button type="button" class="seg-btn" data-quality="4k" role="radio" aria-checked="false">4K</button>
                </div>
                <input type="hidden" id="quality" name="quality" value="1k" />
                <p class="hint field-hint">4K 与多张会更慢、更费额度</p>
              </div>
            </div>

            <div class="row-2">
              <label class="field">
                <span class="label">生成数量</span>
                <div class="stepper">
                  <button type="button" id="n-dec" class="icon-btn" aria-label="减少">−</button>
                  <input id="n" name="n" type="number" min="1" max="4" value="1" readonly />
                  <button type="button" id="n-inc" class="icon-btn" aria-label="增加">+</button>
                </div>
              </label>

              <div class="field">
                <span class="label">参考图 <span class="hint">可选</span></span>
                <div id="upload-zone" class="upload">
                  <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/webp" />
                  <div id="upload-ui" class="upload-ui">
                    <span id="upload-text">点击或拖入图片</span>
                    <span class="hint">PNG / JPEG / WebP · ≤10MB</span>
                  </div>
                  <div id="upload-preview" class="upload-preview hidden">
                    <img id="preview-img" alt="参考图预览" />
                    <button type="button" id="clear-image" class="chip-btn">移除</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <div class="btn-row">
                <button type="submit" id="submit-btn" class="primary">
                  <span class="btn-label">开始生成</span>
                </button>
                <button type="button" id="cancel-btn" class="ghost hidden">取消</button>
              </div>
              <p id="form-status" class="status" role="status" aria-live="polite"></p>
            </div>
          </form>

          <section class="card result-card">
            <div class="result-head">
              <h2>本次结果</h2>
              <div class="result-actions">
                <button type="button" id="regen-btn" class="ghost" disabled>同参数再生成</button>
                <button type="button" id="download-all" class="ghost" disabled>全部下载</button>
              </div>
            </div>
            <p id="result-meta" class="result-meta hidden"></p>
            <div id="result-empty" class="empty">
              <p>生成后图片会出现在这里</p>
              <p class="hint">历史会自动保存在本浏览器，可随时回看、下载、复制提示词</p>
            </div>
            <div id="result-grid" class="grid hidden"></div>
          </section>
        </div>
      </section>

      <section id="panel-history" class="panel" role="tabpanel">
        <div class="card history-card">
          <div class="result-head">
            <h2>历史记录</h2>
            <div class="result-actions">
              <button type="button" id="clear-history" class="ghost danger">清空历史</button>
            </div>
          </div>
          <div class="history-tools">
            <input id="history-search" type="search" placeholder="搜索提示词…" aria-label="搜索历史提示词" />
            <select id="history-filter-aspect" aria-label="按画幅筛选">
              <option value="">全部画幅</option>
              <option value="3:4">3:4</option>
              <option value="4:3">4:3</option>
              <option value="9:16">9:16</option>
              <option value="16:9">16:9</option>
            </select>
            <select id="history-filter-quality" aria-label="按清晰度筛选">
              <option value="">全部清晰度</option>
              <option value="1k">1K</option>
              <option value="2k">2K</option>
              <option value="4k">4K</option>
            </select>
          </div>
          <div id="history-empty" class="empty">
            <p>还没有历史记录</p>
            <p class="hint">生成成功后会自动写入本地历史（仅保存在你当前浏览器）</p>
          </div>
          <div id="history-list" class="history-list hidden"></div>
        </div>
      </section>
    </main>

    <footer class="foot">
      <span>模型固定 gpt-image-2 · 密钥仅存服务端 · 历史仅本机</span>
    </footer>
  </div>

  <dialog id="lightbox" class="lightbox">
    <form method="dialog" class="lightbox-inner">
      <img id="lightbox-img" alt="大图预览" />
      <div class="lightbox-actions">
        <button type="button" id="lightbox-prev" class="ghost" value="prev">上一张</button>
        <button type="button" id="lightbox-next" class="ghost" value="next">下一张</button>
        <button value="close" class="ghost">关闭</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
